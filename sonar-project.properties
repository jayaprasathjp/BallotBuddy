# ==============================================================================
# SonarCloud Project Configuration – BallotBuddy
# ==============================================================================

sonar.projectKey=jayaprasathjp_BallotBuddy
sonar.organization=jayaprasathjp

# Source encoding
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Source roots
# ---------------------------------------------------------------------------
sonar.sources=backend/src,backend/server.js,frontend/src

# ---------------------------------------------------------------------------
# Exclusions – generated/third-party files that must NOT be analysed
# ---------------------------------------------------------------------------
sonar.exclusions=\
  **/coverage/**,\
  **/lcov-report/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/jest.setup.js,\
  **/test-*.js

# ---------------------------------------------------------------------------
# Duplication exclusions – files that are allowed to have similar structure
# (test helpers, generated code, etc.)
# ---------------------------------------------------------------------------
sonar.cpd.exclusions=\
  **/coverage/**,\
  **/lcov-report/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.spec.js

# ---------------------------------------------------------------------------
# Test sources (reported separately, not mixed with production coverage)
# ---------------------------------------------------------------------------
sonar.test.inclusions=\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.spec.js

# ---------------------------------------------------------------------------
# JavaScript / LCOV coverage report
# The path must point to the lcov.info file, NOT the HTML report folder.
# ---------------------------------------------------------------------------
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
