steps:
  # ─── Backend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbuddy-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbuddy-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/ballotbuddy-backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ballotbuddy-backend'
      - '--image=gcr.io/$PROJECT_ID/ballotbuddy-backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3001'
      - '--memory=512Mi'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production,USE_MOCK_AI=${_USE_MOCK_AI},FIREBASE_PROJECT_ID=$PROJECT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_AI_LOCATION=${_VERTEX_AI_LOCATION},VERTEX_AI_MODEL=${_VERTEX_AI_MODEL},ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}'
    waitFor: ['push-backend']

  # ─── Frontend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbuddy:latest'
      - '--build-arg'
      - 'VITE_API_URL=${_BACKEND_URL}'
      - '--build-arg'
      - 'VITE_GCP_PROJECT_ID=${_VITE_GCP_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_GCP_API_KEY=${_VITE_GCP_API_KEY}'
      - '--build-arg'
      - 'VITE_GCP_MESSAGING_SENDER_ID=${_VITE_GCP_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'VITE_GCP_APP_ID=${_VITE_GCP_APP_ID}'
      - '--build-arg'
      - 'VITE_GCP_VAPID_KEY=${_VITE_GCP_VAPID_KEY}'
      - '--build-arg'
      - 'VITE_GA_MEASUREMENT_ID=${_VITE_GA_MEASUREMENT_ID}'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/ballotbuddy']
    waitFor: ['build-frontend', 'deploy-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ballotbuddy'
      - '--image=gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=256Mi'
    waitFor: ['push-frontend']

