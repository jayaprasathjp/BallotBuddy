steps:
  # ─── Backend ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbuddy-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ballotbuddy-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/ballotbuddy-backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ballotbuddy-backend'
      - '--image=gcr.io/$PROJECT_ID/ballotbuddy-backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3001'
      - '--memory=512Mi'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production,USE_MOCK_AI=${_USE_MOCK_AI},FIREBASE_PROJECT_ID=$PROJECT_ID,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_AI_LOCATION=${_VERTEX_AI_LOCATION},VERTEX_AI_MODEL=${_VERTEX_AI_MODEL},ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}'
    waitFor: ['push-backend']

  # ─── Frontend ─────────────────────────────────────────────────────────
  # Step 1: Write VITE_* substitution values to a temp env file in /workspace.
  # create the file here and mount it in the next step via DOCKER_BUILDKIT.
  - name: 'bash'
    id: 'write-frontend-env'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat > /workspace/.vite_env <<EOF
        VITE_API_URL=${_BACKEND_URL}
        VITE_GCP_PROJECT_ID=${_VITE_GCP_PROJECT_ID}
        VITE_GCP_API_KEY=${_VITE_GCP_API_KEY}
        VITE_GCP_MESSAGING_SENDER_ID=${_VITE_GCP_MESSAGING_SENDER_ID}
        VITE_GCP_APP_ID=${_VITE_GCP_APP_ID}
        VITE_GCP_VAPID_KEY=${_VITE_GCP_VAPID_KEY}
        VITE_GA_MEASUREMENT_ID=${_VITE_GA_MEASUREMENT_ID}
        EOF
    waitFor: ['deploy-backend']

  # Step 2: Build the frontend image using BuildKit secret mount.
  # image layer and does NOT appear in docker history / docker inspect.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DOCKER_BUILDKIT=1 docker build \
          --secret id=vite_env,src=/workspace/.vite_env \
          -t gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/ballotbuddy:latest \
          -f frontend/Dockerfile \
          ./frontend
    waitFor: ['write-frontend-env']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/ballotbuddy']
    waitFor: ['build-frontend', 'deploy-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ballotbuddy'
      - '--image=gcr.io/$PROJECT_ID/ballotbuddy:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
    waitFor: ['push-frontend']

substitutions:
  _REGION: asia-south1
  _VERTEX_AI_LOCATION: us-central1
  _VERTEX_AI_MODEL: gemini-2.5-flash
  _USE_MOCK_AI: 'false'
  _ALLOWED_ORIGINS: '*'
  _BACKEND_URL: 'https://ballotbuddy-backend-442722843230.asia-south1.run.app/api'
  _VITE_GCP_PROJECT_ID: ''
  _VITE_GCP_API_KEY: ''
  _VITE_GCP_MESSAGING_SENDER_ID: ''
  _VITE_GCP_APP_ID: ''
  _VITE_GCP_VAPID_KEY: ''
  _VITE_GA_MEASUREMENT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
