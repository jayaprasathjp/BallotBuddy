version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      USE_MOCK_AI: 'true'
      JWT_SECRET: 'dev-secret-change-in-production'
      FIREBASE_PROJECT_ID: 'your-project-id'
      ALLOWED_ORIGINS: 'http://localhost:5173'
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge
